<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CabinOS</title>
<style>
  :root {
    --bg:        #08090d;
    --surface:   #111318;
    --border:    #1e2130;
    --muted:     #3a3f55;
    --text:      #e2e4ef;
    --text-dim:  #6b7094;
    --accent:    #4f8ef7;

    --safety:    #f75a5a;
    --comfort:   #f7c35a;
    --cognitive: #4f8ef7;

    --green:     #3dd68c;
    --radius:    12px;
    --font:      'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100vh;
    display: grid;
    grid-template-rows: 56px 1fr;
    overflow: hidden;
  }

  /* ── Top bar ── */
  header {
    display: flex;
    align-items: center;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    background: var(--surface);
  }
  header .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: var(--text);
  }
  header .logo span { color: var(--accent); }
  header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.4s;
  }
  header .dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  header .status-label { font-size: 12px; color: var(--text-dim); }
  header .cloud-url { font-size: 11px; color: var(--muted); margin-left: auto; font-family: monospace; }

  /* ── Main layout ── */
  main {
    display: grid;
    grid-template-columns: 260px 1fr;
    overflow: hidden;
  }

  /* ── Left sidebar ── */
  aside {
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    background: var(--surface);
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* State cards */
  .state-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .state-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: border-color 0.3s;
  }
  .state-card.updated { border-color: var(--accent); }
  .state-card .icon { font-size: 20px; }
  .state-card .value {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .state-card .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

  .hazard-card { grid-column: span 2; }
  .hazard-on { border-color: var(--safety) !important; }
  .hazard-on .value { color: var(--safety); }

  /* Tool calls log */
  .tool-log { display: flex; flex-direction: column; gap: 6px; }
  .tool-pill {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 11px;
    font-family: monospace;
    color: var(--text-dim);
    animation: fadein 0.3s ease;
  }
  .tool-pill .tool-name { color: var(--cognitive); font-weight: 600; }
  .tool-pill .tool-args { color: var(--text-dim); }

  /* ── Conversation ── */
  .convo-area {
    display: grid;
    grid-template-rows: 1fr 72px;
    overflow: hidden;
  }

  .messages {
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: fadein 0.25s ease;
    max-width: 720px;
  }
  .msg.user { align-self: flex-end; }
  .msg.system { align-self: flex-start; }

  .msg-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .msg.user .msg-meta { flex-direction: row-reverse; }

  .tier-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 20px;
  }
  .tier-safety_critical  { background: rgba(247,90,90,0.15);  color: var(--safety);   border: 1px solid rgba(247,90,90,0.3); }
  .tier-comfort          { background: rgba(247,195,90,0.15); color: var(--comfort);  border: 1px solid rgba(247,195,90,0.3); }
  .tier-cognitive        { background: rgba(79,142,247,0.15); color: var(--cognitive); border: 1px solid rgba(79,142,247,0.3); }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.5;
    max-width: 560px;
  }
  .msg.user .bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.system .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg.system .bubble.error { border-color: var(--safety); color: var(--safety); }
  .msg.system .bubble.edge-only { border-color: var(--safety); }

  .cost-note {
    font-size: 10px;
    color: var(--muted);
    font-family: monospace;
  }

  /* ── Input bar ── */
  .input-bar {
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 24px;
    background: var(--surface);
  }
  .input-bar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 10px 18px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-bar input:focus { border-color: var(--accent); }
  .input-bar input::placeholder { color: var(--muted); }

  .btn {
    border: none;
    border-radius: 24px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    font-family: var(--font);
  }
  .btn:active { transform: scale(0.97); }
  .btn-send {
    background: var(--accent);
    color: #fff;
  }
  .btn-send:disabled { opacity: 0.4; cursor: default; }

  .mic-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .mic-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    gap: 8px;
    font-size: 14px;
    user-select: none;
  }
  .empty-state .big { font-size: 32px; }

  /* Suggestions */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }

  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* Spinner */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">Cabin<span>OS</span></div>
  <div class="dot" id="statusDot"></div>
  <span class="status-label" id="statusLabel">checking…</span>
  <span class="cloud-url" id="cloudUrlLabel"></span>
</header>

<main>
  <!-- Sidebar -->
  <aside>
    <div>
      <div class="section-label">Cabin State</div>
      <div class="state-grid">
        <div class="state-card" id="card-temp">
          <div class="icon">🌡</div>
          <div class="value" id="val-temp">22°C</div>
          <div class="label">Temperature</div>
        </div>
        <div class="state-card" id="card-lights">
          <div class="icon">💡</div>
          <div class="value" id="val-lights">50%</div>
          <div class="label">Cabin Lights</div>
        </div>
        <div class="state-card" id="card-battery">
          <div class="icon">⚡</div>
          <div class="value" id="val-battery">70%</div>
          <div class="label">Battery SoC</div>
        </div>
        <div class="state-card hazard-card" id="card-hazards">
          <div class="icon">🔶</div>
          <div class="value" id="val-hazards">Off</div>
          <div class="label">Hazard Lights</div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-label">Recent Tool Calls</div>
      <div class="tool-log" id="toolLog">
        <div style="font-size:12px;color:var(--muted)">No tool calls yet.</div>
      </div>
    </div>
  </aside>

  <!-- Conversation -->
  <div class="convo-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="big">🚗</div>
        <div>What can I help you with?</div>
        <div class="suggestions">
          <div class="chip" onclick="sendChip(this)">find coffee on my route</div>
          <div class="chip" onclick="sendChip(this)">set cabin temperature to 22</div>
          <div class="chip" onclick="sendChip(this)">turn on hazards</div>
          <div class="chip" onclick="sendChip(this)">plan a charging stop</div>
          <div class="chip" onclick="sendChip(this)">service due</div>
          <div class="chip" onclick="sendChip(this)">dim lights to 15</div>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <button class="mic-btn" title="Voice input (Phase 1 — use --live CLI for now)">🎤</button>
      <input
        type="text"
        id="utteranceInput"
        placeholder="Type a command or question…"
        autocomplete="off"
        onkeydown="if(event.key==='Enter') send()"
      />
      <button class="btn btn-send" id="sendBtn" onclick="send()">Send</button>
    </div>
  </div>
</main>

<script>
  const SESSION_ID = 'dashboard-' + Math.random().toString(36).slice(2, 10);
  let firstMsg = true;
  let toolCalls = [];

  // ── Cloud bridge health check ──
  async function checkCloud() {
    try {
      const r = await fetch('/api/state');
      if (r.ok) {
        document.getElementById('statusDot').classList.add('online');
        document.getElementById('statusLabel').textContent = 'Dashboard online';
      }
    } catch {}
    // Try to show the cloud URL (server logs it; we just label the dashboard endpoint)
    document.getElementById('cloudUrlLabel').textContent = window.location.host;
  }
  checkCloud();

  // ── State panel ──
  function updateState(state) {
    const set = (id, val, cardId, changed) => {
      document.getElementById(id).textContent = val;
      const card = document.getElementById(cardId);
      if (changed) {
        card.classList.add('updated');
        setTimeout(() => card.classList.remove('updated'), 1500);
      }
    };
    set('val-temp',    state.temperature_c + '°C',  'card-temp',    true);
    set('val-lights',  state.lights_percent + '%',   'card-lights',  true);
    set('val-battery', state.battery_soc + '%',      'card-battery', false);

    const hOn = state.hazards_on;
    document.getElementById('val-hazards').textContent = hOn ? 'ON' : 'Off';
    const hCard = document.getElementById('card-hazards');
    hCard.classList.toggle('hazard-on', hOn);
  }

  // ── Tool calls sidebar ──
  function appendToolCall(tc) {
    const log = document.getElementById('toolLog');
    if (toolCalls.length === 0) log.innerHTML = '';
    toolCalls.push(tc);
    const args = Object.entries(tc.arguments || {}).map(([k,v]) => `${k}=${JSON.stringify(v)}`).join(' ');
    const el = document.createElement('div');
    el.className = 'tool-pill';
    el.innerHTML = `<span class="tool-name">${tc.name}</span>${args ? '<br><span class="tool-args">' + args + '</span>' : ''}`;
    log.prepend(el);
  }

  // ── Messages ──
  function addUserMsg(text) {
    hideEmpty();
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `
      <div class="msg-meta"><span>${timestamp()}</span></div>
      <div class="bubble">${esc(text)}</div>`;
    document.getElementById('messages').appendChild(el);
    scroll();
    return el;
  }

  function addSpinner() {
    hideEmpty();
    const el = document.createElement('div');
    el.className = 'msg system';
    el.innerHTML = `<div class="msg-meta"><div class="spinner"></div><span>routing…</span></div>`;
    document.getElementById('messages').appendChild(el);
    scroll();
    return el;
  }

  function replaceWithReply(el, data) {
    const tierClass = 'tier-' + (data.tier || 'cognitive');
    const tierLabel = (data.tier || 'cognitive').replace('_', ' ');
    const cloudTag  = data.cloud_used ? '' : ' · edge-only';
    const bubbleCls = !data.ok ? 'error' : data.tier === 'safety_critical' ? 'edge-only' : '';
    const body      = data.ok ? esc(data.reply || '(no reply)') : '⚠ ' + esc(data.error || 'error');

    let cost = '';
    if (data.estimated_cost_usd != null) {
      cost = `<div class="cost-note">$${data.estimated_cost_usd.toFixed(6)} · ${data.estimated_total_tokens || '?'} tokens</div>`;
    }

    el.innerHTML = `
      <div class="msg-meta">
        <span class="tier-badge ${tierClass}">${tierLabel}${cloudTag}</span>
        <span>${timestamp()}</span>
      </div>
      <div class="bubble ${bubbleCls}">${body}</div>
      ${cost}`;
    scroll();
  }

  // ── Send ──
  async function send() {
    const input = document.getElementById('utteranceInput');
    const utterance = input.value.trim();
    if (!utterance) return;
    input.value = '';

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;

    addUserMsg(utterance);
    const spinnerEl = addSpinner();

    try {
      const resp = await fetch('/api/invoke', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ utterance, session_id: SESSION_ID }),
      });
      const data = await resp.json();

      replaceWithReply(spinnerEl, data);

      if (data.cabin_state) updateState(data.cabin_state);
      if (data.tool_calls && data.tool_calls.length) {
        data.tool_calls.forEach(appendToolCall);
      }
    } catch (err) {
      replaceWithReply(spinnerEl, { ok: false, error: err.message, tier: 'cognitive', cloud_used: true });
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function sendChip(el) {
    document.getElementById('utteranceInput').value = el.textContent;
    send();
  }

  // ── Helpers ──
  function hideEmpty() {
    if (firstMsg) {
      document.getElementById('emptyState').style.display = 'none';
      firstMsg = false;
    }
  }
  function scroll() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }
  function timestamp() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
