name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  edge-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            libcurl4-openssl-dev \
            libssl-dev \
            libsqlite3-dev

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release -- -j2

      - name: Run CTest
        run: ctest --test-dir build --output-on-failure

  cloud-python-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python syntax check
        run: python -m py_compile cloud/lambda/handler.py
